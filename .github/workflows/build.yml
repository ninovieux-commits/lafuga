name: Build La Fuga APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK (debug)
    runs-on: ubuntu-22.04

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer les dependances systeme
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo-dev cmake libffi-dev libssl-dev build-essential ccache

      - name: Installer Buildozer et Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Compiler l'APK
        run: |
          yes | buildozer android debug

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: lafuga-apk-debug
          path: bin/*.apk
